
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Wings Amritsar</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:#111;
    position:sticky;
    top:0;
}

header h1{
    color:#ff3b3b;
}

.cart-box{
    background:#ff3b3b;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1601924582970-9238bcb495d4') center/cover;
}

.hero h2{
    font-size:50px;
}

.btn{
    background:#ff3b3b;
    border:none;
    padding:12px 25px;
    color:white;
    border-radius:30px;
    cursor:pointer;
    margin-top:10px;
}

/* MENU */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:60px;
}

.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.price{
    color:#ff3b3b;
    font-size:18px;
}

.card button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#ff3b3b;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* CART */
.cart-panel{
    position:fixed;
    right:-400px;
    top:0;
    width:300px;
    height:100%;
    background:#111;
    padding:20px;
    transition:0.4s;
}

.cart-panel.active{
    right:0;
}

.cart-item{
    margin:10px 0;
    border-bottom:1px solid #333;
    padding-bottom:10px;
}

.checkout{
    background:#25D366;
    padding:12px;
    text-align:center;
    margin-top:20px;
    cursor:pointer;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    color:#777;
}
</style>
</head>

<body>

<header>
    <h1>Pizza Wings 🍕</h1>
    <div class="cart-box" onclick="toggleCart()">
        Cart 🛒 <span id="count">0</span>
    </div>
</header>

<div class="hero">
    <h2>Hot & Fresh Pizza</h2>
    <p>Order now and get fast delivery in Amritsar</p>
</div>

<div class="menu">
    <div class="card">
        <h3>Cheese Pizza</h3>
        <p class="price">₹199</p>
        <button onclick="addItem('Cheese Pizza',199)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Veggie Pizza</h3>
        <p class="price">₹249</p>
        <button onclick="addItem('Veggie Pizza',249)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Chicken Wings</h3>
        <p class="price">₹299</p>
        <button onclick="addItem('Chicken Wings',299)">Add to Cart</button>
    </div>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cart">
    <h2>Your Order</h2>
    <div id="cartItems"></div>
    <h3>Total: ₹<span id="total">0</span></h3>

    <div class="checkout" onclick="orderWhatsApp()">
        Order on WhatsApp
    </div>
</div>

<footer>
    © 2026 Pizza Wings Amritsar | All Rights Reserved
</footer>

<script>
let cart = [];

function addItem(name, price){
    cart.push({name, price});
    updateCart();
}

function updateCart(){
    document.getElementById("count").innerText = cart.length;

    let items = "";
    let total = 0;

    cart.forEach((item)=>{
        items += `<div class='cart-item'>${item.name} - ₹${item.price}</div>`;
        total += item.price;
    });

    document.getElementById("cartItems").innerHTML = items;
    document.getElementById("total").innerText = total;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

function orderWhatsApp(){
    let msg = "Hello, I want to order:%0A";
    let total = 0;

    cart.forEach(item=>{
        msg += "- " + item.name + " ₹" + item.price + "%0A";
        total += item.price;
    });

    msg += "%0ATotal: ₹" + total;

    window.open("https://wa.me/919876543210?text=" + msg, "_blank");
}
</script>

</body>
</html>
